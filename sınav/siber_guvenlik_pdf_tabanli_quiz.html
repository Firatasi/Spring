const state = { current: 0, progress: JSON.parse(localStorage.getItem('pdfQuizProgress') || '{}') };

function ensureProgress(){
  if(!state.progress[state.current]) state.progress[state.current] = {};
  return state.progress[state.current];
}
function save(){
  localStorage.setItem('pdfQuizProgress', JSON.stringify(state.progress));
}
function populateSelect(){
  const s=document.getElementById('examSelect');
  s.innerHTML='';
  exams.forEach((e,i)=>{
    const o=document.createElement('option');
    o.value=i;
    o.textContent=`${i+1}. ${e.title}`;
    s.appendChild(o);
  });
  s.value=state.current;
}
function renderStats(){
  const exam=exams[state.current], p=ensureProgress();
  const answered=Object.keys(p).length;
  const correct=Object.values(p).filter(v=>v.correct).length;
  const rate=answered?Math.round(correct*100/answered):0;
  document.getElementById('statExam').textContent=String(state.current+1);
  document.getElementById('statAnswered').textContent=`${answered} / ${exam.questions.length}`;
  document.getElementById('statCorrect').textContent=String(correct);
  document.getElementById('statRate').textContent=`${rate}%`;
  document.getElementById('examTitle').textContent=exam.title;
  document.getElementById('examDesc').textContent=exam.description;
}
function renderExam(){
  renderStats();
  const exam=exams[state.current], p=ensureProgress();
  const box=document.getElementById('questions');
  box.innerHTML='';
  exam.questions.forEach((q,qi)=>{
    const ua=p[qi];
    const el=document.createElement('div');
    el.className='card q';
    let opts='';
    q.options.forEach((opt,oi)=>{
      let cls='opt';
      if(ua){
        if(oi===q.answer) cls+=' correct';
        if(ua.selected===oi && oi!==q.answer) cls+=' incorrect';
      }
      opts += `<label class="${cls}"><input type="radio" name="q-${qi}" value="${oi}" ${ua?'disabled':''} ${ua&&ua.selected===oi?'checked':''}><span><strong>${String.fromCharCode(65+oi)})</strong> ${opt}</span></label>`;
    });
    const fb = ua
      ? `<div class="feedback ${ua.correct?'ok':'bad'} show">${ua.correct ? 'Doğru. ' + q.explanation : 'Yanlış. Doğru cevap: <strong>' + String.fromCharCode(65+q.answer) + ') ' + q.options[q.answer] + '</strong><br>' + q.explanation}</div>`
      : '<div class="feedback"></div>';
    el.innerHTML=`<div class="qhead"><h3 class="qtitle">${qi+1}. ${q.stem}</h3><span class="tag">${q.tag}</span></div><div class="opts">${opts}</div>${fb}`;
    el.querySelectorAll('input').forEach(inp=>inp.addEventListener('change',()=>answer(qi,Number(inp.value))));
    box.appendChild(el);
  });
}
function answer(qi, selected){
  const p=ensureProgress();
  if(p[qi]) return;
  const q=exams[state.current].questions[qi];
  p[qi]={selected, correct:selected===q.answer};
  save();
  renderExam();
}
function resetExam(){
  state.progress[state.current]={};
  save();
  renderExam();
}
function showAnswers(){
  const p=ensureProgress();
  exams[state.current].questions.forEach((q,qi)=>{
    if(!p[qi]) p[qi]={selected:-1, correct:false};
  });
  save();
  renderExam();
}
document.getElementById('loadBtn').addEventListener('click',()=>{
  state.current=Number(document.getElementById('examSelect').value);
  renderExam();
});
document.getElementById('resetBtn').addEventListener('click', resetExam);
document.getElementById('showBtn').addEventListener('click', showAnswers);
populateSelect();
renderExam();
</script>
