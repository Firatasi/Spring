version: "3.7"
services:
  postgres:
    image: postgres:latest
    container_name: postgres
    ports:
      - 5432:5432
    deploy:
      resources:
        limits:
          memory: 700m
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2002
      POSTGRES_DB: postgres
    networks:
     - ortakag

networks:
  ortakag:
    driver: bridge