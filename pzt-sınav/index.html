<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yönetim Organizasyon Sınav Uygulaması</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#1e293b;
      --muted:#64748b;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --success:#16a34a;
      --success-bg:#dcfce7;
      --danger:#dc2626;
      --danger-bg:#fee2e2;
      --border:#dbe3ef;
      --warning-bg:#fff7ed;
      --shadow:0 10px 25px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:1100px;
      margin:30px auto;
      padding:20px;
    }

    .header{
      background:linear-gradient(135deg, #2563eb, #1e40af);
      color:#fff;
      border-radius:24px;
      padding:28px;
      box-shadow:var(--shadow);
      margin-bottom:24px;
    }

    .header h1{
      margin:0 0 10px;
      font-size:32px;
    }

    .header p{
      margin:0;
      opacity:.95;
      line-height:1.6;
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:20px 0 26px;
    }

    .exam-btn, .action-btn{
      border:none;
      cursor:pointer;
      border-radius:12px;
      padding:12px 16px;
      font-size:15px;
      font-weight:700;
      transition:.2s ease;
    }

    .exam-btn{
      background:#e2e8f0;
      color:#0f172a;
    }

    .exam-btn:hover{transform:translateY(-1px)}
    .exam-btn.active{
      background:var(--primary);
      color:#fff;
    }

    .action-btn{
      background:var(--primary);
      color:#fff;
    }

    .action-btn:hover{
      background:var(--primary-dark);
    }

    .exam-info{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px 20px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
      display:flex;
      flex-wrap:wrap;
      justify-content:space-between;
      gap:12px;
      align-items:center;
    }

    .score-box{
      font-weight:700;
      color:var(--primary-dark);
    }

    .question-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:22px;
      margin-bottom:18px;
      box-shadow:var(--shadow);
    }

    .question-title{
      font-size:18px;
      font-weight:700;
      margin-bottom:16px;
      line-height:1.6;
    }

    .options{
      display:grid;
      gap:12px;
    }

    .option{
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px 16px;
      background:#f8fafc;
      cursor:pointer;
      transition:.2s ease;
      user-select:none;
    }

    .option:hover{
      border-color:var(--primary);
      background:#eff6ff;
    }

    .option input{
      margin-right:10px;
      transform:scale(1.1);
      pointer-events:none;
    }

    .option.correct{
      border-color:var(--success);
      background:var(--success-bg);
      color:#166534;
      font-weight:700;
    }

    .option.wrong{
      border-color:var(--danger);
      background:var(--danger-bg);
      color:#991b1b;
      font-weight:700;
    }

    .feedback{
      margin-top:14px;
      padding:14px 16px;
      border-radius:12px;
      display:none;
      line-height:1.6;
      font-size:15px;
    }

    .feedback.show{
      display:block;
    }

    .feedback.correct{
      background:var(--success-bg);
      border:1px solid #86efac;
      color:#166534;
    }

    .feedback.wrong{
      background:var(--warning-bg);
      border:1px solid #fdba74;
      color:#9a3412;
    }

    .summary{
      position:sticky;
      bottom:12px;
      background:#0f172a;
      color:#fff;
      border-radius:16px;
      padding:16px 20px;
      box-shadow:var(--shadow);
      margin-top:24px;
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      justify-content:space-between;
      align-items:center;
    }

    .muted{
      color:var(--muted);
      font-size:14px;
    }

    @media (max-width:768px){
      .header h1{font-size:24px}
      .question-title{font-size:16px}
      .summary{position:static}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Yönetim & Organizasyon Sınav Uygulaması</h1>
      <p>
        10 farklı sınav vardır. Her sınav 20 sorudan oluşur.
        Bir şık işaretlediğinde sistem anında kontrol eder.
        Yanlışsa doğru cevap ve kısa açıklama gösterilir.
      </p>
    </div>

    <div class="controls" id="examButtons"></div>

    <div class="exam-info">
      <div>
        <div id="examTitle"><strong>Sınav 1</strong></div>
        <div class="muted">Her sınav 20 soru içerir.</div>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="action-btn" onclick="reloadCurrentExam()">Bu Sınavı Yenile</button>
        <button class="action-btn" onclick="resetAllProgress()">Tüm İlerlemeyi Sıfırla</button>
      </div>
    </div>

    <div id="quizArea"></div>

    <div class="summary">
      <div id="scoreText">Doğru: 0 | Yanlış: 0 | Boş: 20</div>
      <div id="resultText">Puan: 0 / 100</div>
    </div>
  </div>

  <script>
    const questionBank = [
      {
        question: "Klasik yönetim anlayışının temel amacı nedir?",
        options: ["Motivasyon", "Verimlilik", "İletişim", "Esneklik"],
        correct: 1,
        explanation: "Klasik yaklaşımın ana hedefi etkinlik ve verimliliği artırmaktır."
      },
      {
        question: "Klasik yönetim yaklaşımında insan genellikle nasıl görülür?",
        options: ["Sosyal varlık", "Makine benzeri ekonomik varlık", "Yaratıcı birey", "Bağımsız lider"],
        correct: 1,
        explanation: "Klasik yaklaşım insanı daha çok üretim unsuru ve makine benzeri bir varlık olarak ele alır."
      },
      {
        question: "Bilimsel yönetim yaklaşımının öncüsü kimdir?",
        options: ["Henry Fayol", "Elton Mayo", "Frederick Taylor", "Max Weber"],
        correct: 2,
        explanation: "Bilimsel yönetim yaklaşımı Frederick Taylor ile anılır."
      },
      {
        question: "Fayol’a göre aşağıdakilerden hangisi yönetim fonksiyonlarından biridir?",
        options: ["Planlama", "Sosyalleştirme", "Psikolojik analiz", "İkna"],
        correct: 0,
        explanation: "Fayol’un temel yönetim fonksiyonları arasında planlama, örgütleme, emir-komuta, koordinasyon ve kontrol bulunur."
      },
      {
        question: "Weber’in geliştirdiği yaklaşım aşağıdakilerden hangisidir?",
        options: ["İnsan ilişkileri", "Bürokrasi", "Durumsallık", "Sistem yaklaşımı"],
        correct: 1,
        explanation: "Max Weber bürokrasi yaklaşımının en önemli ismidir."
      },
      {
        question: "Klasik yaklaşım neden kapalı sistem olarak eleştirilir?",
        options: ["Teknoloji kullanmadığı için", "Çevreyi dikkate almadığı için", "İş bölümü yaptığı için", "Disiplini savunduğu için"],
        correct: 1,
        explanation: "Klasik teori dış çevre koşullarını yeterince dikkate almaz."
      },
      {
        question: "Neoklasik yaklaşımın odak noktası nedir?",
        options: ["Kurallar", "İnsan davranışları", "Sadece teknoloji", "Sadece üretim"],
        correct: 1,
        explanation: "Neoklasik yaklaşım insanı, motivasyonu ve sosyal ilişkileri merkeze alır."
      },
      {
        question: "Hawthorne araştırmaları neyi göstermiştir?",
        options: ["Sadece ücret önemlidir", "Sosyal faktörler verimliliği etkiler", "Kurallar arttıkça verim artar", "Makine her şeydir"],
        correct: 1,
        explanation: "Bu çalışmalar sosyal ilgi, moral ve grup ilişkilerinin verimlilikte önemli olduğunu göstermiştir."
      },
      {
        question: "McGregor’un X teorisine göre insan nasıl görülür?",
        options: ["Çalışmayı doğal görür", "Sorumluluk almak ister", "Çalışmaktan kaçar", "Kendini yönetir"],
        correct: 2,
        explanation: "X teorisi insanın tembel olduğunu ve sıkı denetlenmesi gerektiğini varsayar."
      },
      {
        question: "McGregor’un Y teorisine göre insan için hangisi doğrudur?",
        options: ["İnsan sorumluluk alabilir", "İnsan tembeldir", "İnsan cezayla çalışır", "İnsan daima işten kaçar"],
        correct: 0,
        explanation: "Y teorisine göre uygun koşullarda insan sorumluluk alır ve kendini yönetebilir."
      },
      {
        question: "Maslow’a göre en temel ihtiyaç hangisidir?",
        options: ["Saygı", "Güvenlik", "Fizyolojik ihtiyaçlar", "Kendini gerçekleştirme"],
        correct: 2,
        explanation: "Maslow piramidinde en altta fizyolojik ihtiyaçlar yer alır."
      },
      {
        question: "Maslow’a göre kendini gerçekleştirme hangi düzeydedir?",
        options: ["Alt düzey", "En üst düzey", "Orta düzey", "Güvenlik düzeyi"],
        correct: 1,
        explanation: "Kendini gerçekleştirme üst düzey bir ihtiyaçtır."
      },
      {
        question: "Herzberg’e göre maaş hangi gruba girer?",
        options: ["Motivasyon faktörü", "Hijyen faktörü", "Bilişsel ihtiyaç", "Öz-aşkınlık"],
        correct: 1,
        explanation: "Maaş hijyen faktörüdür; yokluğu memnuniyetsizlik yaratır ama tek başına kalıcı motivasyon sağlamaz."
      },
      {
        question: "Herzberg’e göre aşağıdakilerden hangisi motivasyon faktörüdür?",
        options: ["Şirket politikası", "Çalışma koşulları", "Başarı", "Maaş"],
        correct: 2,
        explanation: "Başarı, tanınma, sorumluluk ve terfi motivasyon faktörlerindendir."
      },
      {
        question: "Likert’e göre en etkili yönetim sistemi hangisidir?",
        options: ["Sistem 1", "Sistem 2", "Sistem 3", "Sistem 4"],
        correct: 3,
        explanation: "Likert’e göre en etkili sistem katılımcı yönetimi ifade eden Sistem 4’tür."
      },
      {
        question: "Likert’in Sistem 1 modeli hangi özelliği taşır?",
        options: ["Katılımcı", "Danışmacı", "Otoriter ve sömürücü", "Esnek"],
        correct: 2,
        explanation: "Sistem 1 en baskıcı ve otoriter yönetim biçimidir."
      },
      {
        question: "Durumsallık yaklaşımının temel görüşü nedir?",
        options: ["Tek bir en iyi yöntem vardır", "Duruma göre en uygun yapı değişir", "İnsan önemli değildir", "Çevre önemsizdir"],
        correct: 1,
        explanation: "Durumsallık yaklaşımı tek doğru model olmadığını, en uygun yapının koşullara göre değiştiğini savunur."
      },
      {
        question: "Burns ve Stalker’a göre değişken çevrede hangi yapı uygundur?",
        options: ["Mekanik yapı", "Organik yapı", "Kapalı yapı", "Bürokratik yapı"],
        correct: 1,
        explanation: "Hızlı değişen çevrede esnek ve uyumlu organik yapı daha uygundur."
      },
      {
        question: "Stabil ve durağan çevrede hangi yapı daha uygundur?",
        options: ["Organik yapı", "Mekanik yapı", "Projecilik", "Gayriresmi yapı"],
        correct: 1,
        explanation: "Durgun çevrede kurallı ve katı mekanik yapı daha verimli olabilir."
      },
      {
        question: "Organik organizasyon yapısının özelliği nedir?",
        options: ["Katı hiyerarşi", "Esneklik ve yatay iletişim", "Aşırı merkezileşme", "Sıkı kurallar"],
        correct: 1,
        explanation: "Organik yapılar esnek, iletişime açık ve değişime uyumludur."
      },
      {
        question: "Mekanik organizasyon yapısının temel özelliği nedir?",
        options: ["Esnek yapı", "Katı kurallar ve hiyerarşi", "Düşük formalleşme", "Yüksek katılım"],
        correct: 1,
        explanation: "Mekanik yapılarda hiyerarşi, formalleşme ve kurallar güçlüdür."
      },
      {
        question: "Sistemler yaklaşımına göre organizasyon nasıl görülür?",
        options: ["Bağımsız parçalar", "Birbiriyle ilişkili alt sistemlerden oluşan bütün", "Sadece insan topluluğu", "Sadece üretim sistemi"],
        correct: 1,
        explanation: "Sistem yaklaşımı organizasyonu ilişkili alt sistemlerden oluşan bütün olarak ele alır."
      },
      {
        question: "Açık sistem ne demektir?",
        options: ["Çevresiyle etkileşimi olmayan sistem", "Sadece içe dönük sistem", "Çevresiyle bilgi, enerji ve kaynak alışverişi yapan sistem", "Kuralsız sistem"],
        correct: 2,
        explanation: "Açık sistemler çevreyle etkileşim halindedir."
      },
      {
        question: "Kapalı sistem için hangisi doğrudur?",
        options: ["Çevreyle yoğun etkileşim vardır", "Girdi ve çıktı sürekli değişir", "Çevre etkisi sınırlıdır", "Uyum kabiliyeti yüksektir"],
        correct: 2,
        explanation: "Kapalı sistemlerde çevreyle etkileşim ya çok azdır ya da hiç yoktur."
      },
      {
        question: "Sistem yaklaşımında entropi neyi ifade eder?",
        options: ["Düzenin artması", "Verim artışı", "Düzensizlik ve bozulma eğilimi", "Motivasyon artışı"],
        correct: 2,
        explanation: "Entropi sistemin zamanla düzensizliğe ve bozulmaya gitmesidir."
      },
      {
        question: "Negatif entropi ne anlama gelir?",
        options: ["Sistemin kapanması", "Dışardan bilgi ve kaynak alarak sistemi toparlama", "Kuralları yok etme", "Sadece denetim yapma"],
        correct: 1,
        explanation: "Negatif entropi, bozulan sistemi dış kaynaklarla yeniden düzenleme sürecidir."
      },
      {
        question: "Sistem sınırı neyi belirler?",
        options: ["Kâr düzeyini", "İç ve dış ayrımını", "Yalnızca çalışanları", "Sadece teknolojiyi"],
        correct: 1,
        explanation: "Sistem sınırı sistemin içinde ve dışında nelerin yer aldığını belirler."
      },
      {
        question: "Deterministik sistem nasıl bir sistemdir?",
        options: ["Sonuçları belirsizdir", "Çıktısı tam öngörülemez", "Girdi ve süreçlere göre sonucu nettir", "Sadece sosyal sistemdir"],
        correct: 2,
        explanation: "Deterministik sistemlerde sonuçlar daha kesindir."
      },
      {
        question: "Probabilistik sistem için hangisi doğrudur?",
        options: ["Sonuç kesindir", "Sonuç ihtimallere bağlıdır", "Çevre yoktur", "Kurallar yoktur"],
        correct: 1,
        explanation: "Probabilistik sistemlerde çıktılar olasılıksaldır, kesinlik düşüktür."
      },
      {
        question: "Fayol’un yaklaşımı daha çok hangi düzeye yöneliktir?",
        options: ["Üst yönetim", "İşçi seviyesi", "Sadece teknisyenler", "Sadece dış çevre"],
        correct: 0,
        explanation: "Fayol yönetim süreci ve yöneticilerin işlevleri üzerinde durur."
      },
      {
        question: "Taylor’un yaklaşımı daha çok hangi düzeye odaklanır?",
        options: ["Üst yönetim", "İş süreçleri ve işçi düzeyi", "Makro çevre", "Pazar araştırması"],
        correct: 1,
        explanation: "Taylor işin nasıl daha verimli yapılacağı ve işçi performansı üzerinde durur."
      },
      {
        question: "Weber’in otorite türlerinden biri değildir:",
        options: ["Karizmatik", "Geleneksel", "Bürokratik/yasal", "Duygusal"],
        correct: 3,
        explanation: "Weber’in otorite türleri karizmatik, geleneksel ve yasal-rasyoneldir."
      },
      {
        question: "Klasik yaklaşımın iki temel odağı aşağıdakilerden hangisidir?",
        options: ["Motivasyon ve moral", "Verimlilik ve formal yapı", "Katılım ve esneklik", "Çevre ve teknoloji"],
        correct: 1,
        explanation: "Klasik teoride verimlilik ve formal organizasyon düzeni ön plandadır."
      },
      {
        question: "Neoklasik yaklaşımda yönetici nasıl görülür?",
        options: ["Sadece denetleyici", "Sadece ceza veren", "Liderlik ve iletişim kuran kişi", "Yetkisiz gözlemci"],
        correct: 2,
        explanation: "Neoklasik yaklaşım yöneticinin liderlik, iletişim ve motivasyon rolüne vurgu yapar."
      },
      {
        question: "Argyris’e göre olgun bireyin özelliği nedir?",
        options: ["Pasiflik", "Bağımlılık", "Uzun vadeli düşünme", "Dar ilgi alanı"],
        correct: 2,
        explanation: "Olgun birey daha bağımsız, aktif ve uzun vadeli düşünebilen kişidir."
      },
      {
        question: "Woodward araştırmaları daha çok hangi ilişkiyi incelemiştir?",
        options: ["Teknoloji ve organizasyon yapısı", "Maaş ve tatmin", "Motivasyon ve liderlik", "Sosyal çevre ve grup"],
        correct: 0,
        explanation: "Woodward, teknoloji ile organizasyon yapısı arasındaki ilişkiyi araştırmıştır."
      },
      {
        question: "Perrow’un sınıflamasında iş çeşitliliği ve analiz ihtiyacı fazla ise bu hangi tür işe yakındır?",
        options: ["Rutin", "Mühendislik", "Sanat", "Rutin olmayan"],
        correct: 3,
        explanation: "Yüksek çeşitlilik ve yüksek analiz ihtiyacı rutin olmayan işleri gösterir."
      },
      {
        question: "Proje organizasyonunun temel özelliklerinden biri nedir?",
        options: ["Sürekli ve değişmez olması", "Geçici ve belirli amaçlı olması", "Hiyerarşisiz olması", "Çevreden bağımsız olması"],
        correct: 1,
        explanation: "Projeler genellikle başlangıç ve bitişi belli, geçici yapılardır."
      },
      {
        question: "Matriks organizasyon yapısında temel özellik nedir?",
        options: ["Tek yöneticiye bağlılık", "Hem fonksiyonel hem proje temelli ilişki", "Kuralsız çalışma", "Çevreden kopuk yapı"],
        correct: 1,
        explanation: "Matriks yapıda çalışanlar hem fonksiyonel hem proje yöneticileriyle ilişki içindedir."
      },
      {
        question: "Sistemler yaklaşımında bilgi akışının önemi neden büyüktür?",
        options: ["Çünkü sadece muhasebede kullanılır", "Çünkü alt sistemler arası uyumu sağlar", "Çünkü sadece dış çevre içindir", "Çünkü üretimi durdurur"],
        correct: 1,
        explanation: "Bilgi akışı alt sistemlerin birbiriyle uyumlu çalışmasını sağlar."
      },
      {
        question: "Aşağıdakilerden hangisi hem sistemler hem durumsallık yaklaşımının ortak yönüdür?",
        options: ["Tek doğruyu savunmaları", "Çevreyi dikkate almaları", "İnsanı önemsiz görmeleri", "Kapalı sistem olmaları"],
        correct: 1,
        explanation: "Her iki yaklaşım da çevresel koşulları dikkate alır."
      }
    ];

    const exams = Array.from({ length: 10 }, (_, i) => ({
      id: i + 1,
      title: `Sınav ${i + 1}`
    }));

    let currentExam = 1;
    let currentQuestions = [];
    let userAnswers = {};

    function seededRandom(seed) {
      let x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }

    function generateExamQuestions(examNo) {
      const indexed = questionBank.map((q, i) => ({ ...q, _id: i }));
      const arr = [...indexed];

      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(seededRandom(examNo * 1000 + i) * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }

      return arr.slice(0, 20);
    }

    function renderExamButtons() {
      const wrap = document.getElementById("examButtons");
      wrap.innerHTML = "";

      exams.forEach(exam => {
        const btn = document.createElement("button");
        btn.className = "exam-btn" + (exam.id === currentExam ? " active" : "");
        btn.textContent = exam.title;
        btn.onclick = () => {
          currentExam = exam.id;
          loadExam();
        };
        wrap.appendChild(btn);
      });
    }

    function loadExam() {
      currentQuestions = generateExamQuestions(currentExam);
      userAnswers[currentExam] = userAnswers[currentExam] || {};
      document.getElementById("examTitle").innerHTML = `<strong>Sınav ${currentExam}</strong>`;
      renderExamButtons();
      renderQuiz();
      updateScore();
    }

    function renderQuiz() {
      const area = document.getElementById("quizArea");
      area.innerHTML = "";

      currentQuestions.forEach((q, index) => {
        const saved = userAnswers[currentExam][index];

        const card = document.createElement("div");
        card.className = "question-card";

        const title = document.createElement("div");
        title.className = "question-title";
        title.innerHTML = `${index + 1}. ${q.question}`;
        card.appendChild(title);

        const optionsWrap = document.createElement("div");
        optionsWrap.className = "options";

        q.options.forEach((opt, optIndex) => {
          const label = document.createElement("label");
          label.className = "option";

          if (saved !== undefined) {
            if (optIndex === q.correct) {
              label.classList.add("correct");
            }
            if (saved === optIndex && saved !== q.correct) {
              label.classList.add("wrong");
            }
          }

          label.innerHTML = `
            <input type="radio" name="q_${index}" ${saved === optIndex ? "checked" : ""} ${saved !== undefined ? "disabled" : ""}>
            <strong>${String.fromCharCode(65 + optIndex)})</strong> ${opt}
          `;

          label.onclick = () => selectAnswer(index, optIndex);
          optionsWrap.appendChild(label);
        });

        card.appendChild(optionsWrap);

        const feedback = document.createElement("div");
        feedback.className = "feedback";

        if (saved !== undefined) {
          const isCorrect = saved === q.correct;
          feedback.classList.add("show", isCorrect ? "correct" : "wrong");
          feedback.innerHTML = isCorrect
            ? `✅ <strong>Doğru.</strong> ${q.explanation}`
            : `❌ <strong>Yanlış.</strong> Doğru cevap: <strong>${String.fromCharCode(65 + q.correct)}) ${q.options[q.correct]}</strong><br>${q.explanation}`;
        }

        card.appendChild(feedback);
        area.appendChild(card);
      });
    }

    function selectAnswer(questionIndex, selectedIndex) {
      if (userAnswers[currentExam][questionIndex] !== undefined) return;

      userAnswers[currentExam][questionIndex] = selectedIndex;
      renderQuiz();
      updateScore();
    }

    function updateScore() {
      const answers = userAnswers[currentExam] || {};
      let correct = 0;
      let wrong = 0;
      let blank = 20;

      currentQuestions.forEach((q, i) => {
        if (answers[i] !== undefined) {
          blank--;
          if (answers[i] === q.correct) correct++;
          else wrong++;
        }
      });

      const score = Math.round((correct / 20) * 100);
      document.getElementById("scoreText").textContent =
        `Doğru: ${correct} | Yanlış: ${wrong} | Boş: ${blank}`;
      document.getElementById("resultText").textContent =
        `Puan: ${score} / 100`;
    }

    function reloadCurrentExam() {
      delete userAnswers[currentExam];
      loadExam();
    }

    function resetAllProgress() {
      if (!confirm("Tüm sınavlardaki cevaplar sıfırlansın mı?")) return;
      userAnswers = {};
      loadExam();
    }

    loadExam();
  </script>
</body>
</html>
